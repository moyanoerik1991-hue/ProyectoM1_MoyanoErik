<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumergete en una colorida busqueda</title> 
</head>
<body>
    <!-- HEADER: Título y descripción -->
    <header class="header">
      <div class="header-contenido">
        <h1 class="titulo-principal">Paleta de Colores</h1>
        <p class="descripcion">Encuentra el color que mejor se adapte a tu estilo</p>
       </div>
    </header>
    <!-- AREA DE CONTENIDO PRINCIPAL -->
    <main class="paleta">
        <div class="control">
           <label for="cantidad">Cantidad de Colores:</label>
                <!-- EL USUARIO ELIGE LA CANTIDAD DE COLORES -->
                <select id="cantidad">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                </select>
                <section class="galeria" id="galeria"></section>
                <script src="./js/script.js" defer></script>
        </div>
    </main>  
    <!-- PIE DE PÁGINA -->
    <footer id="contacto">
      <small>Contacto: moyanoerik1991@gmail.com | &copy; 2026</small>
    </footer>    
</body>

</html>
