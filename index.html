<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumergete en una colorida busqueda</title> 
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <!-- HEADER: Título y descripción -->
    <header class="header">
       <div>
           <h1 class="titulo-principal">Paleta de Colores 🎨</h1>
           <p class="descripcion">Encuentra el Color que Mejor se Adapte a tu Estilo</p>
       </div>
    </header>
    <button id="toggleTema" class="toggle-tema">🌙</button>
    <!-- AREA DE CONTENIDO PRINCIPAL -->
    <main class="paleta">
        <div class="control">
           <label for="cantidad">Cantidad de Colores:</label>
                <!-- EL USUARIO ELIGE LA CANTIDAD DE COLORES -->
                <select id="cantidad">
                    <option value="6">6</option>
                    <option value="8">8</option>
                    <option value="9" selected>9</option>
                </select>
                <button id="btnHSL">HSL</button>
                <button id="btnHEX">HEX</button>
                <button id="verGuardados">Colores Guardados</button>
                <button id="limpiarStorage">Limpiar storage</button>
        </div>
        <section class="galeria" id="galeria"></section>
        <script src="./js/script.js" defer></script>
    </main>  
    <!-- PIE DE PÁGINA -->
    <footer id="contacto">
        <small>
            Proyecto Integrador Modulo 1 | Erik Demian Moyano | Full Stack Developer<br>  
            Contacto: moyanoerik1991@gmail.com | &copy; 2026
        </small>
    </footer>    
</body>

</html>
